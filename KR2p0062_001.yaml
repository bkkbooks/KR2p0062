body:
  text: 圉於朸術申公子攀載皇駒王子圍奪之申公爭之王子圍立為王申公子攀見王王曰申公忘夫朸術之下乎申公曰臣不知君王之將為君如臣知君王之為君臣將或致焉王曰不穀以笑申公是言棄之今日申公事不穀必以是心
